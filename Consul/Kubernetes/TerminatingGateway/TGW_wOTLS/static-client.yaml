global:
  enabled: true
  name: consul
  image: hashicorp/consul:2.0.0-rc1
  datacenter: tgw
  tls:
    enabled: true
  acls:
    manageSystemACLs: true
server:
  enabled: true
  replicas: 1
terminatingGateways:
  enabled: true
ui:
  enabled: true
  service:
    type: NodePort
connectInject:
  enabled: true
  #default: true
abhineet@abhineet-M17KGYKQHL final % cat static-client.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: static-client
---
apiVersion: v1
kind: Service
metadata:
  name: static-client
spec:
  selector:
    app: static-client
  ports:
    - port: 4321
      targetPort: 4321
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: static-client
  name: static-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-client
  template:
    metadata:
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/transparent-proxy: "true"
      labels:
        app: static-client
    spec:
      serviceAccountName: static-client
      containers:
        - name: static-client
          image: curlimages/curl:7.77.0
          ports:
            - containerPort: 4321
          command: ["/bin/sh", "-c", "--"]
          args: ["while true; do sleep 30; done;"]
          securityContext:
            privileged: true
            runAsUser: 0
