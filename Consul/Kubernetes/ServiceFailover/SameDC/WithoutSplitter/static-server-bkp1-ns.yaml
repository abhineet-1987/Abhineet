# 02-servers.yaml (Example for the 'bkp1' namespace)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: static-server
  namespace: bkp1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-server
  namespace: bkp1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-server
  template:
    metadata:
      labels:
        app: static-server
      annotations:
        consul.hashicorp.com/connect-inject: "true"
    spec:
      serviceAccountName: static-server
      containers:
      - name: static-server
        image: hashicorp/http-echo:latest
        args:
          - -text="Hello from static-server in bkp1 namespace"
          - -listen=:8080
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: static-server
  namespace: bkp1
spec:
  selector:
    app: static-server
  ports:
    - port: 80
      targetPort: 8080
