apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceSplitter
metadata:
  name: static-server-tea
  namespace: default
spec:
  splits:
    - weight: 10
      service: static-server-tea-v1
    - weight: 90
      service: static-server-tea-v2
